<!DOCTYPE html>
<html>
<head>
    <title>Authentication System</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
        }

        /* Login Card */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: all 0.6s ease;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 40px;
            width: 380px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

       input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 10px rgba(108,99,255,0.5);
        }
        input::placeholder {
            color: rgba(255,255,255,0.7);
            opacity: 1;
        }

        input {
            color: #ffffff;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #6c63ff, #3f3dff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            background: #3f3dff;
            transform: scale(1.02);
        }
        .switch {
            margin-top: 15px;
            font-size: 13px;
        }

        .switch span {
            color: #050507;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        /* Dashboard Layout */
        .dashboard {
            display: none;
            height: 100vh;
            background: #111;
        }
       .sidebar {
            width: 240px;
            background: #1a1a2e;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h3 {
            margin-bottom: 30px;
            font-size: 18px;
            color: #6c63ff;
        }

        .sidebar button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
            text-align: left;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #444;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- AUTH SECTION -->
<div class="auth-container" id="authSection">
    <div class="card">
        <h2>Authentication System</h2>

        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Login</button>

            <div class="switch">
                Not registered? <span onclick="showRegister()">Register here</span>
            </div>
            <p style="margin-top:10px;">
                <span onclick="showForgotPassword()" 
                    style="color:#140e63; cursor:pointer;">
                    Forgot Password?
                </span>
            </p>
        </div>

        <div id="registerForm" class="hidden">
            <input type="text" id="regUsername" placeholder="Username">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="text" id="regFullName" placeholder="Full Name">
            <input type="password" id="regPassword" placeholder="Password">
            <select id="regRole">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            <button onclick="register()">Register</button>
            <div class="switch">
                Already registered? <span onclick="showLogin()">Login here</span>
            </div>
        </div>
        <div id="forgotForm" class="hidden">
                <h3>Forgot Password</h3>

                <input type="email" id="forgotEmail" placeholder="Enter your email">

                <button onclick="sendResetToken()">Send Reset Token</button>
                <div id="tokenBox" class="hidden">
                    <p style="margin-top:15px;">Your Reset Token:</p>
                    <input type="text" id="generatedToken" readonly>
                    <button onclick="copyToken()">Copy Token</button>
                </div>
                <div class="switch">
                    Back to <span onclick="showLogin()">Login</span>
                </div>
            </div>
            <div id="resetForm" class="hidden">
                <h3>Reset Password</h3>

                <input type="text" id="resetToken" placeholder="Enter reset token">

                <input type="password" id="newPassword" placeholder="New Password">

                <button onclick="resetPassword()">Reset Password</button>

                <div class="switch">
                    Back to <span onclick="showLogin()">Login</span>
                </div>
            </div>
        <p id="message"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="sidebar">
        <h3 id="welcomeText"></h3>
        <button onclick="loadProfile()">My Profile</button>
        <button id="seeUsersBtn" onclick="seeUsers()">See Users</button>
        <button id="manageUsersBtn" onclick="loadUsers()">Manage Users</button>
        <button onclick="loadLocations()">Manage Locations</button>
        <button onclick="logout()">Logout</button>

    </div>

    <div class="content" id="contentArea">
        <h2>Welcome</h2>
    </div>
</div>

<script>
let accessToken = "";
let userRole = "";
let currentUser = null;

// Ensure permissions are loaded properly
if(currentUser && !currentUser.permissions){
    currentUser.permissions = "";
}

function showRegister(){
    loginForm.classList.add("hidden");
    forgotForm.classList.add("hidden");
    resetForm.classList.add("hidden");
    registerForm.classList.remove("hidden");
}
function showForgotPassword(){
    loginForm.classList.add("hidden");
    registerForm.classList.add("hidden");
    resetForm.classList.add("hidden");
    forgotForm.classList.remove("hidden");
    tokenBox.classList.add("hidden");
    generatedToken.value = "";
}

function showResetForm(){
    loginForm.classList.add("hidden");
    registerForm.classList.add("hidden");
    forgotForm.classList.add("hidden");
    resetForm.classList.remove("hidden");
}

function showLogin(){
    registerForm.classList.add("hidden");
    forgotForm.classList.add("hidden");
    resetForm.classList.add("hidden");
    loginForm.classList.remove("hidden");

    // clear reset fields
    resetToken.value = "";
    newPassword.value = "";
}
async function register(){
    const error = validatePassword(regPassword.value);

    if(error){
        message.innerText = error;
        return;   // stop execution
    }

    const res = await fetch("/register", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:regUsername.value,
            email:regEmail.value,
            full_name:regFullName.value,
            password:regPassword.value,
            role:regRole.value
        })
    });
    const data = await res.json();
    message.innerText = res.ok ? "Registered Successfully!" : data.detail;
}

async function login(){
    const formData = new URLSearchParams();
    formData.append("username", loginUsername.value);
    formData.append("password", loginPassword.value);

    const res = await fetch("/login", { method:"POST", body:formData });
    const data = await res.json();


    if(res.ok){
        accessToken = data.access_token;

        const profile = await fetch("/users/me", {
            headers:{Authorization:`Bearer ${accessToken}`}
        });

        const user = await profile.json();
        userRole = user.role;
        currentUser = user;

        
        document.getElementById("authSection").style.display = "none";
        document.getElementById("dashboard").style.display = "flex";
        welcomeText.innerText = "Hello " + user.username;

        if(userRole !== "admin"){
            //manageUsersBtn.style.display = "none";
            seeUsersBtn.style.display = "none";
        }

    } else {
        message.innerText = data.detail;
    }
}
async function loadProfile(){
    const res = await fetch("/users/me", {
        headers:{Authorization:`Bearer ${accessToken}`}
    });
    const data = await res.json();

    contentArea.innerHTML = `
        <h2>My Profile</h2>
        <p><b>Username:</b> ${data.username}</p>
        <p><b>Email:</b> ${data.email}</p>
        <p><b>Role:</b> ${data.role}</p>
        <p><b>Permissions:</b> ${data.permissions || "None"}</p>

    `;
}
async function loadUsers(){

    contentArea.innerHTML = `
        <h2>Manage Users</h2>

        <div style="margin-bottom:20px;">
            <button onclick="showAddUser()">➕ Add User</button>
            <button onclick="showEditUserList()">✏ Edit User</button>
            <button onclick="showDeleteUserList()">❌ Delete User</button>
            <button onclick="showPermissionPanel()">🔐 Set Permissions</button>
        </div>

        <div id="manageSection"></div>
    `;
}
function showAddUser(){

    document.getElementById("manageSection").innerHTML = `
        <h3>Add User</h3>
        <input id="newUsername" placeholder="Username">
        <input id="newEmail" placeholder="Email">
        <input id="newFullName" placeholder="Full Name">
        <input id="newPassword" placeholder="Password">
        <select id="newRole">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>
        <button onclick="addUser()">Create User</button>
    `;
}
async function showEditUserList(){

    const res = await fetch(
        currentUser.role === "admin" ? "/admin/users" : "/users/me",
        {
            headers:{ Authorization:`Bearer ${accessToken}` }
        }
    );


    const users = await res.json();

    let html = `<h3>Select User to Edit</h3>`;

    users.forEach(u=>{
        html += `
            <button onclick="showEdit('${u.username}','${u.email}','${u.role}')">
                ${u.username}
            </button>
        `;
    });

    document.getElementById("manageSection").innerHTML = html;
}
async function showDeleteUserList(){

    const res = await fetch("/admin/users", {
        headers:{ Authorization:`Bearer ${accessToken}` }
    });

    const users = await res.json();

    let html = `<h3>Select User to Delete</h3>`;

    users.forEach(u=>{
        html += `
            <button onclick="deleteUser('${u.username}')">
                Delete ${u.username}
            </button>
        `;
    });

    document.getElementById("manageSection").innerHTML = html;
}
async function showPermissionPanel(){

    const res = await fetch("/admin/users", {
        headers:{ Authorization:`Bearer ${accessToken}` }
    });

    const users = await res.json();

    let html = `<h3>Set User Permissions</h3>`;

    users.forEach(u=>{
        html += `
            <div style="margin-bottom:10px;">
                <b>${u.username}</b><br>
                <input id="perm_${u.username}" 
                       placeholder="add,edit,delete"
                       value="${u.permissions || ""}">
                <button onclick="setPermission('${u.username}')">
                    Update
                </button>
            </div>
        `;
    });

    document.getElementById("manageSection").innerHTML = html;
}
async function setPermission(username){

    const value = document.getElementById(`perm_${username}`).value;

    const res = await fetch(
        `/admin/set-permissions/${username}?permissions=${encodeURIComponent(value)}`,
        {
            method:"PUT",
            headers:{
                Authorization:`Bearer ${accessToken}`
            }
        }
    );

    if(res.ok){
        alert("Permissions Updated");
    } else {
        const error = await res.json();
        alert(error.detail || "Failed");
    }
}

async function addUser(){
    const error = validatePassword(regPassword.value);

    if(error){
        message.innerText = error;
        return;   // stop execution
    }
    const res = await fetch("/users", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            Authorization:`Bearer ${accessToken}`
        },
        body:JSON.stringify({
            username:newUsername.value,
            email:newEmail.value,
            full_name:newFullName.value,
            password:newPassword.value,
            role:newRole.value
        })
    });

    const data = await res.json();

    if(res.ok){
        alert("User Added");
        loadUsers();
    } else {
        alert(data.detail);
    }
}
function showEdit(username,email,role){

    contentArea.innerHTML = `
        <h2>Edit User</h2>
        <input id="editEmail" value="${email}">
        <input id="editFullName" placeholder="Full Name">
        <select id="editRole">
            <option value="user" ${role==="user"?"selected":""}>User</option>
            <option value="admin" ${role==="admin"?"selected":""}>Admin</option>
        </select>
        <button onclick="updateUser('${username}')">Update</button>
        <button onclick="cancelEdit()">Cancel</button>
    `;
}
function showPermission(username, permissions){

    contentArea.innerHTML = `
        <h2>Set Permissions for ${username}</h2>

        <input id="permInput" value="${permissions}" placeholder="add,edit,delete">

        <button onclick="updatePermission('${username}')">
            Save
        </button>

        <button onclick="loadUsers()">
            Cancel
        </button>
    `;
}


async function updateUser(username){

    if(!username){
        alert("Username missing!");
        return;
    }

    const emailValue = document.getElementById("editEmail").value;
    const fullNameValue = document.getElementById("editFullName").value;
    const roleValue = document.getElementById("editRole").value;

    const res = await fetch(`/users/${username}?email=${encodeURIComponent(emailValue)}&full_name=${encodeURIComponent(fullNameValue)}&role=${roleValue}`, {
        method:"PUT",
        headers:{
            Authorization:`Bearer ${accessToken}`
        }
    });

    if(res.ok){
        alert("User Updated Successfully");
        loadUsers();
    } else {
        const error = await res.json();
        alert(error.detail || "Update Failed");
    }
}
async function updatePermission(username){

    const perm = document.getElementById("permInput").value;

    const res = await fetch(`/admin/set-permissions/${username}?permissions=${perm}`, {
        method: "PUT",
        headers: {
            Authorization: `Bearer ${accessToken}`
        }
    });

    if(res.ok){
        alert("Permissions Updated");
        loadUsers();
    } else {
        const err = await res.json();
        alert(err.detail || "Error updating permission");
    }
}

async function deleteUser(username){

    console.log("Deleting user:", username); // 👈 ADD THIS

    if(!username){
        alert("Username missing!");
        return;
    }

    if(!confirm("Are you sure?")) return;

    const res = await fetch(`/users/${username}`, {
        method:"DELETE",
        headers:{
            Authorization:`Bearer ${accessToken}`
        }
    });

    if(res.ok){
        alert("User Deleted Successfully");
        loadUsers();
    } else {
        const error = await res.json();
        alert(error.detail || "Delete Failed");
    }
}


function hasPermission(action){

    if(!currentUser) return false;

    if(currentUser.role === "admin"){
        return true;
    }

    if(!currentUser.permissions || currentUser.permissions.trim() === ""){
        return false;
    }

    return currentUser.permissions.split(",").map(p=>p.trim()).includes(action);
}

function cancelEdit(){

    if(currentUser.role === "admin"){
        loadUsers();   // Admin goes back to user management
    } else {
        loadProfile(); // Normal user goes back to profile
    }

}
async function seeUsers(){

    const res = await fetch("/admin/users", {
        headers:{
            Authorization:`Bearer ${accessToken}`
        }
    });

    if(!res.ok){
        alert("Only Admin can view users");
        return;
    }

    const users = await res.json();

    let html = `
        <h2>All Users</h2>

        <table>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Permissions</th>
            </tr>
    `;

    users.forEach(u=>{
        html += `
            <tr>
                <td>${u.username}</td>
                <td>${u.email || "-"}</td>
                <td>${u.role}</td>
                <td>${u.permissions || "None"}</td>
            </tr>
        `;
    });

    html += "</table>";

    contentArea.innerHTML = html;
}
function validatePassword(password){

    if(password.length < 8){
        return "Password must be at least 8 characters";
    }

    if(!/[A-Z]/.test(password)){
        return "Password must contain uppercase letter";
    }

    if(!/[a-z]/.test(password)){
        return "Password must contain lowercase letter";
    }

    if(!/[0-9]/.test(password)){
        return "Password must contain a number";
    }

    if(!/[!@#$%^&*]/.test(password)){
        return "Password must contain special character";
    }

    return null;
}

function logout(){

    // Clear all auth data
    accessToken = "";
    userRole = "";
    currentUser = null;

    // Clear content area
    contentArea.innerHTML = "<h2>Welcome</h2>";

    // Reset login fields
    loginUsername.value = "";
    loginPassword.value = "";

    // Hide dashboard
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("authSection").style.display = "flex";
    manageUsersBtn.style.display = "block";
    seeUsersBtn.style.display = "block";
}
async function sendResetToken(){

    if(!forgotEmail.value){
        alert("Please enter email");
        return;
    }

    const res = await fetch("/forgot-password", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: forgotEmail.value
        })
    });

    const data = await res.json();

    if(res.ok){

        generatedToken.value = data.reset_token;
        tokenBox.classList.remove("hidden");

        // Auto move to reset form after 2 sec
        setTimeout(() => {
            showResetForm();
            resetToken.value = data.reset_token;
        }, 2000);

    } else {
        alert(data.detail);
    }
}
function copyToken(){
    navigator.clipboard.writeText(generatedToken.value)
    .then(() => alert("Token copied successfully!"))
    .catch(() => alert("Copy failed"));
}
async function resetPassword(){

    if(!resetToken.value || !newPassword.value){
        alert("All fields required");
        return;
    }

    const error = validatePassword(newPassword.value);
    if(error){
        alert(error);
        return;
    }

    const res = await fetch("/reset-password", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            token: resetToken.value,
            new_password: newPassword.value
        })
    });

    const data = await res.json();

    if(res.ok){
        alert("Password reset successful!");

        // Clear fields
        resetToken.value = "";
        newPassword.value = "";

        showLogin();

    } else {
        alert(data.detail);
    }
}
function loadLocations(){

contentArea.innerHTML = `
<h2>Location Management</h2>

<h3>Add State</h3>
<input id="stateName" placeholder="State Name">
<button onclick="addState()">Add State</button>

<h3>Add District</h3>
<select id="stateDropdown"></select>
<input id="districtName" placeholder="District Name">
<button onclick="addDistrict()">Add District</button>

<h3>Add City</h3>
<select id="districtDropdown"></select>
<input id="cityName" placeholder="City Name">
<button onclick="addCity()">Add City</button>
`;

loadStates();
}
async function loadStates(){

const res = await fetch("/states");
const states = await res.json();

let dropdown = document.getElementById("stateDropdown");

if(!dropdown) return;

dropdown.innerHTML="";

states.forEach(state=>{
let option=document.createElement("option");
option.value=state.id;
option.text=state.name;
dropdown.appendChild(option);
});

loadDistricts();
}
async function addState(){

const name=document.getElementById("stateName").value;

const res = await fetch(`/states?name=${encodeURIComponent(name)}`,{
method:"POST"
});

if(res.ok){
alert("State Added");
loadStates();
}else{
alert("Failed");
}

}
async function loadDistricts(){

const state_id=document.getElementById("stateDropdown").value;

const res=await fetch(`/districts/${state_id}`);
const districts=await res.json();

let dropdown=document.getElementById("districtDropdown");

dropdown.innerHTML="";

districts.forEach(d=>{
let option=document.createElement("option");
option.value=d.id;
option.text=d.name;
dropdown.appendChild(option);
});
}
document.addEventListener("change", function(e){

if(e.target.id==="stateDropdown"){
loadDistricts();
}

});
async function addDistrict(){

const name=document.getElementById("districtName").value;
const state_id=document.getElementById("stateDropdown").value;

const res = await fetch(`/districts?name=${encodeURIComponent(name)}&state_id=${state_id}`,{
method:"POST"
});

if(res.ok){
alert("District Added");
loadDistricts();
}else{
alert("Failed");
}
}
async function addCity(){

const name=document.getElementById("cityName").value;
const district_id=document.getElementById("districtDropdown").value;

const res = await fetch(`/cities?name=${encodeURIComponent(name)}&district_id=${district_id}`,{
method:"POST"
});

if(res.ok){
alert("City Added");
}else{
alert("Failed");
}

}
</script>
</body>
</html>
